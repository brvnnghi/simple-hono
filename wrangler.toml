name = "simple-hono"
main = "src/app.tsx"
compatibility_date = "2026-03-17"

[assets]
directory = "./public"

[[d1_databases]]
binding = "DB"
database_name = "YOUR_DB_NAME"
database_id = "YOUR_DB_ID"
migrations_table = "d1_migrations"
migrations_dir = "migrations"

[[routes]]
pattern = "hono.youhoc.com"
custom_domain = true